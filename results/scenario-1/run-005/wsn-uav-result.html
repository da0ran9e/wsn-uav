ocument.getElementById('c6').checked && d.packets){ctx.fillStyle='rgba(255,0,0,0.4)';ctx.strokeStyle='#FF0000';ctx.lineWidth=1.5;for(let pk of d.packets){if(pk.t>t)break;if(!pk.success){const dst=d.nodes[pk.dst];if(dst){const p=gp(dst.x,dst.y);if(p.x>-50&&p.x<c.width+50&&p.y>-50&&p.y<c.height+50){ctx.beginPath();ctx.moveTo(p.x-4,p.y-4);ctx.lineTo(p.x+4,p.y+4);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x+4,p.y-4);ctx.lineTo(p.x-4,p.y+4);ctx.stroke();}}}}}if(document.getElementById('c5').checked && d.packets){let renderCount=0;const fadeWindow=2.0;for(let pk of d.packets){if(pk.t>t)break;const dst=d.nodes[pk.dst];if(dst){const age=t-pk.t;const fadeFactor=Math.max(0,1-age/fadeWindow);const alpha=Math.max(0.1,fadeFactor*0.8);if(pk.type==='uav'){ctx.strokeStyle=pk.success?`rgba(100,200,100,${alpha})`:`rgba(255,100,100,${alpha})`;}else if(pk.type==='g2g'){ctx.strokeStyle=pk.success?`rgba(255,255,100,${alpha})`:`rgba(200,150,100,${alpha})`;}ctx.lineWidth=1.5;const p1=gp(pk.srcX,pk.srcY);const p2=gp(dst.x,dst.y);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();renderCount++;}}}ctx.fillStyle='#FFFF00';ctx.font='12px monospace';ctx.fillText('TX packets:'+d.packets.length+' (t='+t.toFixed(1)+')',10,20);if(document.getElementById('c3').checked){ctx.strokeStyle='#667eea';ctx.lineWidth=2;ctx.globalAlpha=0.6;ctx.beginPath();let f=true;for(let pt of d.uavTrajectory){if(pt.t>t)break;const p=gp(pt.x,pt.y);if(f){ctx.moveTo(p.x,p.y);f=false;}else{ctx.lineTo(p.x,p.y);}}ctx.stroke();ctx.globalAlpha=1;}if(document.getElementById('c2').checked){const nodeFrags={};for(let pk of d.packets){if(pk.t>t)break;if(pk.success){if(!nodeFrags[pk.dst])nodeFrags[pk.dst]=new Set();nodeFrags[pk.dst].add(pk.fragId);}}for(let nid in d.nodes){const n=d.nodes[nid];if(!n)continue;const p=gp(n.x,n.y);if(p.x>-50&&p.x<c.width+50&&p.y>-50&&p.y<c.height+50){let col='#4A5B7F';let r=6;const fragCount=nodeFrags[nid]?nodeFrags[nid].size:0;if(fragCount>0){const maxFrags=d.config.numFragments;const ratio=Math.min(1,fragCount/maxFrags);const hue=Math.floor(240-ratio*240);col=`hsl(${hue},60%,55%)`;r=6+ratio*2;}ctx.fillStyle=col;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();if(n.isDetectionNode){ctx.strokeStyle='#C85A54';ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,Math.PI*2);ctx.stroke();}if(document.getElementById('c4').checked && n.isCandidate){ctx.strokeStyle='#9E8C42';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,r+2,0,Math.PI*2);ctx.stroke();}}}}let up=null;for(let i=0;i<d.uavTrajectory.length;i++){if(d.uavTrajectory[i].t>t){if(i>0){const p1=d.uavTrajectory[i-1];const p2=d.uavTrajectory[i];const tt=(t-p1.t)/(p2.t-p1.t);up={x:p1.x+(p2.x-p1.x)*tt,y:p1.y+(p2.y-p1.y)*tt};}break;}}if(!up && d.uavTrajectory.length>0)up=d.uavTrajectory[d.uavTrajectory.length-1];if(up){const p=gp(up.x,up.y);if(p.x>-50&&p.x<c.width+50&&p.y>-50&&p.y<c.height+50){ctx.fillStyle='#667eea';ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(102,126,234,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,16,0,Math.PI*2);ctx.stroke();}}}function upd(){document.getElementById('timeLabel').textContent=t.toFixed(1);document.getElementById('maxLabel').textContent=d.config.simTime.toFixed(1);document.getElementById('slider').max=d.config.simTime;document.getElementById('info1').textContent=d.config.detected?'✓ Detected':'✗ Not detected';if(d.config.detected)document.getElementById('info1').textContent+=' @ '+d.config.detectionTime.toFixed(1)+'s';document.getElementById('info2').textContent='Path: '+d.config.uavPathLength.toFixed(0)+'m';render();}function anim(){if(p){t+=0.05;if(t>=d.config.simTime)p=false;document.getElementById('slider').value=t;upd();}requestAnimationFrame(anim);}function play(){p=true;}function pause(){p=false;}function reset(){t=0;p=false;ox=0;oy=0;zm=200;document.getElementById('slider').value=0;document.getElementById('zoomLabel').textContent='20x';upd();}function seek(v){t=parseFloat(v);upd();}function exp(){const j=
